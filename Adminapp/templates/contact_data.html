<!DOCTYPE html>
{%  extends 'dashboard.html'   %}
{%   block content   %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                  <div class="card-body">
                    <h4 class="card-title">Contacts</h4>
                    <p class="card-description">  <code>.table</code>
                    </p>
                    <div class="table-responsive">
                      <table class="table">
                        <thead>
                          <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Message</th>

                          </tr>
                        </thead>
                        <tbody>
                        {% for i in data %}
                         <tr>
                           <td>{{i.Name}}</td>
                           <td>{{i.Email}}</td>
                             <td>{{i.Message}}</td>

                          </tr>
                         {%   endfor   %}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
</body>
</html>
{%  endblock   %}
