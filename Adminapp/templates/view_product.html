<!DOCTYPE html>
{%  extends 'dashboard.html'   %}
{%   block content   %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                  <div class="card-body">
                    <h4 class="card-title">Products</h4>
                    <p class="card-description">  <code>.table</code>
                    </p>
                    <div class="table-responsive">
                      <table class="table">
                        <thead>
                          <tr>
                            <th>Category</th>
                            <th>Product Name</th>
                            <th>Price</th>
                            <th>Description</th>
                             <th>Image</th>
                              <th>Options</th>
                          </tr>
                        </thead>
                        <tbody>
                        {% for i in product %}
                         <tr>
                           <td>{{i.Category_name}}</td>
                           <td>{{i.Product_name}}</td>
                           <td>{{i.Price}}</td>
                           <td>{{i.Description}}</td>
                           <td>
                               {<img src="{{i.ProductImage.url}}"width="90">}
                           </td>
                             <td><a href="{%  url  'edit_product' product_id=i.id    %}">Edit</a>
                             <a href="{%  url  'delete_product' product_id=i.id   %}">Delete</a>
                             </td>
                          </tr>
                         {%   endfor   %}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
</body>
</html>
{%  endblock   %}
