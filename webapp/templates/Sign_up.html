<!DOCTYPE html>
{%  load static  %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Wellness Sign Up</title>
    <link rel="stylesheet" href="{% static 'login/css/style.css' %}">
    <style>
        .messages-container {
            margin-bottom: 16px;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        .alert-error {
            background-color: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fca5a5;
        }
        .alert-success {
            background-color: #dcfce7;
            color: #15803d;
            border: 1px solid #86efac;
        }
    </style>
</head>
<body>
    <div class="nature-background">
        <div class="floating-leaf leaf-1"></div>
        <div class="floating-leaf leaf-2"></div>
        <div class="floating-leaf leaf-3"></div>
        <div class="floating-leaf leaf-4"></div>
    </div>

    <div class="login-container">
        <div class="wellness-card">
            <div class="organic-border"></div>

            <div class="mindful-header">
                <div class="zen-logo">
                    <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
                        <circle cx="28" cy="28" r="26" stroke="currentColor" stroke-width="2" fill="none" opacity="0.6"/>
                        <circle cx="28" cy="28" r="18" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.8"/>
                        <circle cx="28" cy="28" r="10" fill="currentColor" opacity="0.9"/>
                        <path d="M28 18v20M18 28h20" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <div class="zen-glow"></div>
                </div>
                <h1>Sign Up</h1>
                <p>Welcome to Easy Grocery</p>
            </div>

            <!-- Django Messages -->
            {% if messages %}
            <div class="messages-container">
                {% for message in messages %}
                <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'save_registration' %}" class="harmony-form" onsubmit="return passwordValidation()">
                {% csrf_token %}
                <div class="organic-field">
                    <div class="field-nature"></div>
                    <input type="text" id="username" name="username" autocomplete="username">
                    <label>Username</label>
                    <div class="growth-indicator">
                        <div class="leaf-sprout"></div>
                    </div>
                </div>
                <small id="usernameerror" style="color:#b91c1c; font-size:12px; margin-top:-10px; display:block;"></small>

                <div class="organic-field">
                    <div class="field-nature"></div>
                    <input type="email" id="email" name="email" autocomplete="email">
                    <label>Email</label>
                    <div class="growth-indicator">
                        <div class="leaf-sprout"></div>
                    </div>
                </div>
                <small id="emailerror" style="color:#b91c1c; font-size:12px; margin-top:-10px; display:block;"></small>

                <div class="organic-field">
                    <div class="field-nature"></div>
                    <input type="password" id="password" name="password" autocomplete="new-password">
                    <label for="password">Password</label>
                    <!-- FIX: type="button" so it doesn't submit the form -->
                    <button type="button" class="nature-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                        <svg class="eye-visible" width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M10 4c-4 0-7 3-8 6 1 3 4 6 8 6s7-3 8-6c-1-3-4-6-8-6zm0 10a4 4 0 110-8 4 4 0 010 8zm0-6a2 2 0 100 4 2 2 0 000-4z" fill="currentColor"/>
                        </svg>
                        <svg class="eye-hidden" width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M3 3l14 14M8.5 8.5a2 2 0 002.83 2.83m-.83-4.83a4 4 0 014 4M10 6C6 6 3 9 2 12c.5 1.5 2 3.5 4 4.5M10 14c4 0 7-3 8-6-.5-1.5-2-3.5-4-4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                <small id="passworderror" style="color:#b91c1c; font-size:12px; margin-top:-10px; display:block;"></small>

                <div class="organic-field">
                    <div class="field-nature"></div>
                    <input type="password" id="password1" name="password1" autocomplete="new-password">
                    <label for="password1">Confirm Password</label>
                    <button type="button" class="nature-toggle" id="confirmPasswordToggle" aria-label="Toggle confirm password visibility">
                        <svg class="eye-visible" width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M10 4c-4 0-7 3-8 6 1 3 4 6 8 6s7-3 8-6c-1-3-4-6-8-6zm0 10a4 4 0 110-8 4 4 0 010 8zm0-6a2 2 0 100 4 2 2 0 000-4z" fill="currentColor"/>
                        </svg>
                        <svg class="eye-hidden" width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M3 3l14 14M8.5 8.5a2 2 0 002.83 2.83m-.83-4.83a4 4 0 014 4M10 6C6 6 3 9 2 12c.5 1.5 2 3.5 4 4.5M10 14c4 0 7-3 8-6-.5-1.5-2-3.5-4-4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                <small id="confirmerror" style="color:#b91c1c; font-size:12px; margin-top:-10px; display:block;"></small>

                <button type="submit" class="harmony-button">
                    <div class="button-earth"></div>
                    <span class="button-text">Register</span>
                    <div class="button-growth">
                        <div class="growing-circle circle-1"></div>
                        <div class="growing-circle circle-2"></div>
                        <div class="growing-circle circle-3"></div>
                    </div>
                    <div class="button-aura"></div>
                </button>
            </form>

            <div class="balance-divider">
                <div class="divider-branch"></div>
                <div class="divider-center">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L8 8h8l-4-6zM12 22l4-6H8l4 6zM2 12l6-4v8l-6-4zM22 12l-6 4V8l6 4z" fill="currentColor" opacity="0.6"/>
                    </svg>
                </div>
                <div class="divider-branch"></div>
            </div>

            <div class="nurture-signup">
                <span>Already have an account? </span>
                <a href="{% url 'Sign_in' %}" class="growth-link">Sign In</a>
            </div>
        </div>
    </div>

    <script src="{% static 'login/js/script.js' %}"></script>

    <script>
        function passwordValidation() {
            var username = document.getElementById("username").value;
            var email    = document.getElementById("email").value;
            var pass1    = document.getElementById("password").value;
            var pass2    = document.getElementById("password1").value;

            // Regex pattern - min 6 chars, 1 uppercase, 1 number, 1 special character
            let pattern = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!*&]).{6,}$/;

            // Clear previous errors
            document.getElementById("usernameerror").innerHTML = "";
            document.getElementById("emailerror").innerHTML    = "";
            document.getElementById("passworderror").innerHTML = "";
            document.getElementById("confirmerror").innerHTML  = "";

            // Username empty check
            if (username == "") {
                document.getElementById("usernameerror").innerHTML = "Username is required...!";
                return false;
            }

            // Email empty check
            if (email == "") {
                document.getElementById("emailerror").innerHTML = "Email is required...!";
                return false;
            }

            // Password empty check
            if (pass1 == "") {
                document.getElementById("passworderror").innerHTML = "Password is required...!";
                return false;
            }

            // Strong password check
            if (!pattern.test(pass1)) {
                document.getElementById("passworderror").innerHTML = "Password must contain at least one uppercase letter, 1 number, 1 special character (@$!*&)";
                return false;
            }

            // Confirm password empty check
            if (pass2 == "") {
                document.getElementById("confirmerror").innerHTML = "Confirm password is required...!";
                return false;
            }

            // Match checking
            if (pass1 !== pass2) {
                document.getElementById("confirmerror").innerHTML = "Passwords do not match";
                return false;
            }

            return true;
        }
    </script>

</body>
</html>
